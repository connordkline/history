<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Depression Survival – Play Button Fixed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0f0b07; color:#e8d5b5; font-family:Arial,sans-serif; margin:0; padding:12px; }
    .card {
      background:#ffe; border:3px solid #8b4513; border-radius:10px; padding:16px; margin:10px;
      min-height:200px; cursor:pointer; user-select:none; touch-action:manipulation;
    }
    .card:active { background:#ffd; transform:scale(1.03); }
    #modal { 
      position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; 
      align-items:center; justify-content:center; z-index:1000;
    }
    #modal-box {
      background:#ffe; border:5px solid #8b4513; border-radius:12px;
      width:90%; max-width:420px; padding:24px; color:#333;
    }
    button { padding:12px 28px; font-size:1.1rem; border-radius:8px; cursor:pointer; margin:8px; }
    .play-btn { background:#28a745; color:white; }
    .close-btn { background:#6c757d; color:white; }
    #log {
      background:#111; color:#0f0; font-family:monospace; padding:12px;
      height:160px; overflow-y:auto; border:2px solid #444; margin:16px 0;
    }
  </style>
</head>
<body>

<h2 style="text-align:center; color:#ffcc66;">Depression Survival – Play Button Debug</h2>

<div id="log">Game starting…\nClick card → modal opens → press green PLAY CARD button</div>

<h3>Your hand (click to view/play):</h3>
<div id="hand"></div>

<button onclick="draw()" style="background:#ffc107; color:black; display:block; margin:20px auto;">
  Draw one card
</button>

<!-- MODAL -->
<div id="modal">
  <div id="modal-box">
    <h2 id="m-title"></h2>
    <p id="m-desc" style="margin:16px 0;"></p>
    <p id="m-stats" style="font-weight:bold;"></p>
    <div style="text-align:center;">
      <button class="close-btn" onclick="closeModal()">Close</button>
      <button class="play-btn" 
              onclick="playSelectedCard(); return false;">
        PLAY CARD
      </button>
    </div>
  </div>
</div>

<script>
// ────────────── Global selected card ──────────────
let selected = null;

// ────────────── Cards ──────────────
const deck = [
  {id:1, n:"Victory Garden", e:"🥕", v:18, h:10, d:"Plant food at home"},
  {id:2, n:"Barter",         e:"🤝", v:15, h:12, d:"Trade with neighbors"},
  {id:3, n:"CCC Work",       e:"🌲", v:22, h:8,  d:"Son joins work camp"},
  {id:4, n:"Soup Kitchen",   e:"🍲", v:10, h:18, d:"Get free meal"}
];

let hand = deck.slice(0,3); // start with 3 cards

function log(txt) {
  const el = document.getElementById('log');
  el.innerHTML += txt + '\n';
  el.scrollTop = el.scrollHeight;
  console.log(txt);
}

function render() {
  const cont = document.getElementById('hand');
  cont.innerHTML = '';
  hand.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div style="font-size:3rem; text-align:center;">${c.e}</div>
      <div style="font-weight:bold; text-align:center;">${c.n}</div>
      <div style="text-align:center; color:#555; margin-top:8px;">${c.d}</div>
      <div style="margin-top:12px; text-align:center;">
        <span style="background:#28a745;color:white;padding:4px 10px;border-radius:12px;">-${c.v} hardship</span>
        <span style="background:#17a2b8;color:white;padding:4px 10px;border-radius:12px;">+${c.h} health</span>
      </div>
    `;
    div.onclick = () => openModal(c);
    cont.appendChild(div);
  });
}

function openModal(card) {
  log(`→ Card clicked: ${card.n} (id ${card.id})`);
  selected = card;

  document.getElementById('m-title').textContent = card.n + '  ' + card.e;
  document.getElementById('m-desc').textContent = card.d;
  document.getElementById('m-stats').innerHTML = 
    `Reduces hardship by <b>${card.v}</b><br>Increases family health by <b>${card.h}</b>`;

  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  log("Modal closed (via Close button)");
  document.getElementById('modal').style.display = 'none';
  selected = null;
}

function playSelectedCard() {
  if (!selected) {
    log("BUG: No card selected when PLAY was pressed!", "color:red");
    alert("No card selected – try clicking a card again.");
    return;
  }

  log(`PLAY button pressed → executing ${selected.n}`);

  // Apply effects
  hardshipLevel = Math.max(0, (window.hardshipLevel || 100) - selected.v);
  familyHealth  = Math.min(100, (window.familyHealth || 100) + selected.h);

  // Remove from hand
  hand = hand.filter(c => c.id !== selected.id);
  render();

  // Update display (simple version)
  document.getElementById('log').innerHTML += 
    `\nPlayed ${selected.n} → hardship now ~${hardshipLevel}, health now ~${familyHealth}\n`;

  closeModal();
  log("Card successfully played! ✓", "color:#0f0; font-weight:bold");
}

// Start
window.onload = () => {
  window.hardshipLevel = 100;
  window.familyHealth = 100;
  render();
  log("Ready. Click any card, then press PLAY CARD in the popup.", "color:#0ff");
};
</script>
</body>
</html>
