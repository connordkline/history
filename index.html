<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEW DEAL SHOWDOWN – Great Depression Card Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    body {
      background: linear-gradient(to bottom, #1e1a16, #0f0b08);
      color: #f5e8d3;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.6);
    }
    .health-bar {
      transition: width 0.8s ease-out;
    }
    #game-log {
      scrollbar-width: thin;
      scrollbar-color: #8b6f47 #2d2218;
    }
    #game-log::-webkit-scrollbar {
      width: 6px;
    }
    #game-log::-webkit-scrollbar-track {
      background: #2d2218;
    }
    #game-log::-webkit-scrollbar-thumb {
      background: #8b6f47;
      border-radius: 3px;
    }
  </style>
</head>
<body class="min-h-screen pb-8">

  <!-- Header -->
  <header class="bg-black/70 border-b border-amber-900/50 sticky top-0 z-50 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="text-3xl">📉</div>
        <div>
          <h1 class="text-2xl md:text-4xl font-bold text-amber-200">NEW DEAL SHOWDOWN</h1>
          <p class="text-xs md:text-sm text-amber-400">Great Depression Card Game</p>
        </div>
      </div>
      <div class="flex gap-4">
        <button onclick="showRules()" class="text-amber-300 hover:text-white text-sm flex items-center gap-2">
          <i class="fa-solid fa-book"></i> Rules
        </button>
        <button onclick="restartGame()" class="bg-amber-800 hover:bg-amber-700 px-4 py-2 rounded text-sm font-medium">
          Restart
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">

    <!-- Left – Depression (mobile: top) -->
    <section class="lg:w-72 bg-[#2c2118] border border-red-900/50 rounded-xl p-5 order-2 lg:order-1">
      <h2 class="text-red-300 text-sm font-semibold mb-3 uppercase tracking-wide">Depression Strength</h2>
      <div class="mb-4">
        <div class="flex justify-between text-xs mb-1 text-red-200">
          <span>Power</span>
          <span id="depression-health-text">100</span>
        </div>
        <div class="h-3 bg-black/60 rounded-full overflow-hidden border border-red-900/40">
          <div id="depression-health-bar" class="h-full w-full bg-gradient-to-r from-red-700 to-red-500"></div>
        </div>
      </div>
      <div class="text-center mt-4">
        <p class="text-xs text-amber-400 mb-2">Latest Crisis</p>
        <div id="ai-played-card" class="bg-[#3a2a1f] border border-red-800 rounded-xl p-4 min-h-[180px] flex flex-col items-center justify-center text-center">
          <div class="text-5xl opacity-40 mb-3">📉</div>
          <p class="text-amber-300/60 text-sm">Waiting...</p>
        </div>
      </div>
    </section>

    <!-- Center – Game Area -->
    <section class="flex-1 order-1 lg:order-2 flex flex-col gap-6">

      <!-- Log (scrollable) -->
      <div id="game-log" class="bg-black/60 border border-amber-900/40 rounded-xl p-4 h-48 md:h-64 overflow-y-auto text-sm leading-relaxed">
        <div class="text-center text-amber-400/70 py-8">
          <i class="fa-solid fa-scroll mr-2"></i> Game events appear here
        </div>
      </div>

      <!-- Health – Your Economy -->
      <div class="text-center">
        <div class="text-xs md:text-sm text-emerald-400 mb-1">YOUR ECONOMY</div>
        <div class="flex items-center justify-center gap-4">
          <div id="player-health" class="text-5xl md:text-6xl font-bold text-emerald-300">100</div>
          <div class="h-10 w-px bg-amber-800"></div>
          <div class="w-40 md:w-56">
            <div class="h-4 bg-black/60 rounded-full overflow-hidden">
              <div id="player-health-bar" class="h-full w-full bg-gradient-to-r from-emerald-600 to-teal-400"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Player Hand -->
      <div>
        <div class="flex justify-between items-center mb-3">
          <div class="text-xs md:text-sm text-amber-400">YOUR NEW DEAL CARDS • <span id="hand-count">3</span></div>
          <button onclick="drawCard()" class="text-xs md:text-sm flex items-center gap-2 hover:text-white">
            Draw <span id="deck-count" class="bg-amber-900 px-2 py-1 rounded-full text-[10px]">12</span>
          </button>
        </div>
        <div id="player-hand" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
          <!-- cards go here -->
        </div>
      </div>

      <!-- Controls -->
      <div class="flex justify-center">
        <button onclick="endTurnEarly()" class="bg-amber-950 hover:bg-amber-900 border border-amber-800 px-6 py-3 rounded-xl text-sm flex items-center gap-2">
          <i class="fa-solid fa-forward"></i> End Turn
        </button>
      </div>
    </section>

    <!-- Right – Stats (mobile: bottom) -->
    <section class="lg:w-72 bg-[#2c2118] border border-amber-900/50 rounded-xl p-5 order-3">
      <div class="text-center mb-6">
        <div class="text-xs text-amber-400">TURN</div>
        <div id="turn-counter" class="text-5xl font-bold text-amber-200">01</div>
      </div>
      <div class="space-y-4 text-sm">
        <div class="flex justify-between">
          <span class="text-amber-400">Recovery Score</span>
          <span id="recovery-score" class="text-emerald-300 font-bold">0</span>
        </div>
        <div class="flex justify-between">
          <span class="text-amber-400">Policies Passed</span>
          <span id="cards-played-count">0</span>
        </div>
      </div>
    </section>

  </main>

  <!-- Card Play Modal -->
  <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50" onclick="if(event.target===this) hideModal()">
    <div class="bg-[#3a2f1f] border-4 border-amber-800 rounded-2xl max-w-sm w-[92%] max-h-[90vh] overflow-y-auto">
      <div id="modal-card" class="p-6"></div>
      <div class="flex border-t border-amber-800 p-4 gap-3">
        <button onclick="hideModal()" class="flex-1 py-3 bg-gray-800 hover:bg-gray-700 rounded-xl">Cancel</button>
        <button id="modal-play-btn" onclick="confirmPlayCard()" class="flex-1 py-3 bg-emerald-700 hover:bg-emerald-600 rounded-xl font-medium">Play Policy</button>
      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="game-over-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50" onclick="if(event.target===this) hideGameOver()">
    <div class="bg-[#2c2118] border-4 border-amber-800 rounded-2xl p-6 max-w-md w-[92%] text-center">
      <div id="game-over-icon" class="text-7xl mb-4"></div>
      <h2 id="game-over-title" class="text-3xl font-bold mb-2"></h2>
      <p id="game-over-subtitle" class="text-amber-400 mb-6"></p>
      <div class="bg-black/50 rounded-xl p-5 mb-6 grid grid-cols-2 gap-4 text-left text-sm">
        <div>
          <div class="text-amber-400 text-xs">Score</div>
          <div id="final-score" class="text-4xl text-emerald-300">0</div>
        </div>
        <div>
          <div class="text-amber-400 text-xs">Policies</div>
          <div id="final-cards" class="text-4xl text-amber-300">0</div>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="hideGameOver(); restartGame()" class="flex-1 py-4 bg-amber-800 hover:bg-amber-700 rounded-xl">Play Again</button>
      </div>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────
    //  CARD DATA (shortened a bit for clarity)
    // ────────────────────────────────────────────────
    const playerDeck = [
      {id:1, name:"Emergency Banking Act", emoji:"🏦", value:18, heal:8, description:"Closed weak banks, restored trust", fact:"Over $1B returned in days", type:"policy"},
      {id:2, name:"Civilian Conservation Corps", emoji:"🌲", value:22, heal:5, description:"Jobs planting trees & building parks", fact:"2.5 million young men employed", type:"policy"},
      {id:3, name:"Works Progress Administration", emoji:"🏗️", value:28, heal:0, description:"Massive public works program", fact:"Built 650,000 miles of roads", type:"policy"},
      {id:4, name:"Tennessee Valley Authority", emoji:"⚡", value:20, heal:12, description:"Electricity & flood control", fact:"Largest US power provider by 1940", type:"policy"},
      {id:5, name:"Social Security Act", emoji:"🛡️", value:12, heal:25, description:"Retirement & unemployment insurance", fact:"Cornerstone of US safety net", type:"policy"},
      // ... you can add the rest back if you want more cards
    ];

    const aiDeck = [
      {id:101, name:"Black Tuesday", emoji:"📉", damage:24, description:"Worst stock market crash day", fact:"$14 billion lost in hours", type:"crisis"},
      {id:102, name:"Bank Runs", emoji:"🏦", damage:19, description:"Thousands of banks collapsed", fact:"9,000 failed 1930–1933", type:"crisis"},
      {id:103, name:"Dust Bowl", emoji:"🌪️", damage:22, description:"Severe drought & dust storms", fact:"Millions migrated", type:"crisis"},
      // ... add more if desired
    ];

    // Game State
    let playerHealth = 100;
    let depressionHealth = 100;
    let playerHand = [];
    let currentPlayerDeck = [];
    let currentAIDeck = [];
    let cardsPlayed = 0;
    let currentTurn = 1;
    let recoveryScore = 0;
    let selectedCard = null;
    let gameOver = false;

    // ────────────────────────────────────────────────
    //  HELPERS
    // ────────────────────────────────────────────────
    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function updateHealth() {
      const p = Math.max(0, Math.min(100, playerHealth));
      const d = Math.max(0, Math.min(100, depressionHealth));
      document.getElementById("player-health").textContent = Math.floor(p);
      document.getElementById("player-health-bar").style.width = p + "%";
      document.getElementById("depression-health-text").textContent = Math.floor(d);
      document.getElementById("depression-health-bar").style.width = d + "%";
    }

    function createCardHTML(card, clickable = true) {
      return `
        <div class="card bg-amber-100 text-black rounded-xl p-4 shadow-lg border border-amber-800 h-56 flex flex-col justify-between ${clickable ? 'cursor-pointer' : ''}">
          <div class="flex justify-between">
            <div class="text-4xl">${card.emoji}</div>
            <div class="text-xs font-bold ${card.type==='policy'?'text-emerald-700':'text-red-700'}">${card.type.toUpperCase()}</div>
          </div>
          <div>
            <div class="font-bold text-lg leading-tight">${card.name}</div>
            <div class="text-xs text-black/70 mt-1 line-clamp-2">${card.description}</div>
          </div>
          <div class="flex gap-2 text-xs">
            ${card.type==='policy' ? `
              <div class="bg-emerald-600 text-white px-3 py-1 rounded-full">Impact ${card.value}</div>
              ${card.heal ? `<div class="bg-teal-600 text-white px-3 py-1 rounded-full">Heal ${card.heal}</div>` : ''}
            ` : `
              <div class="bg-red-600 text-white px-3 py-1 rounded-full">Damage ${card.damage}</div>
            `}
          </div>
        </div>
      `;
    }

    function renderHand() {
      const container = document.getElementById("player-hand");
      container.innerHTML = "";
      playerHand.forEach(card => {
        const div = document.createElement("div");
        div.innerHTML = createCardHTML(card);
        div.onclick = () => showCardModal(card);
        container.appendChild(div);
      });
      document.getElementById("hand-count").textContent = playerHand.length;
    }

    function log(msg, className = "") {
      const log = document.getElementById("game-log");
      const div = document.createElement("div");
      div.className = `py-2 border-b border-amber-900/30 ${className}`;
      div.innerHTML = msg;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function drawCard() {
      if (gameOver || currentPlayerDeck.length === 0 || playerHand.length >= 5) return;
      const card = currentPlayerDeck.pop();
      playerHand.push(card);
      renderHand();
      document.getElementById("deck-count").textContent = currentPlayerDeck.length;
      log(`Drew: <strong>${card.name}</strong>`, "text-emerald-400");
    }

    function showCardModal(card) {
      if (gameOver) return;
      selectedCard = card;
      document.getElementById("modal-card").innerHTML = `
        ${createCardHTML(card, false)}
        <div class="mt-4 text-sm bg-black/40 p-4 rounded-xl">
          <div class="text-emerald-400 text-xs uppercase mb-1">History</div>
          <p class="italic">${card.fact}</p>
        </div>
      `;
      document.getElementById("modal-backdrop").classList.remove("hidden");
    }

    function hideModal() {
      document.getElementById("modal-backdrop").classList.add("hidden");
      selectedCard = null;
    }

    function confirmPlayCard() {
      if (!selectedCard) return;
      hideModal();

      playerHand = playerHand.filter(c => c.id !== selectedCard.id);
      depressionHealth = Math.max(0, depressionHealth - selectedCard.value);
      if (selectedCard.heal) playerHealth = Math.min(100, playerHealth + selectedCard.heal);

      cardsPlayed++;
      recoveryScore += Math.floor(selectedCard.value * 1.3);

      renderHand();
      updateHealth();
      document.getElementById("recovery-score").textContent = recoveryScore;
      document.getElementById("cards-played-count").textContent = cardsPlayed;

      log(`Played <strong>${selectedCard.name}</strong> → -${selectedCard.value} Depression ${selectedCard.heal ? `+${selectedCard.heal} Economy` : ''}`, "text-emerald-400");

      setTimeout(aiTurn, 600);
      checkEnd();
    }

    function aiTurn() {
      if (gameOver || currentAIDeck.length === 0) return;
      const crisis = currentAIDeck.pop();
      document.getElementById("ai-played-card").innerHTML = `
        <div class="text-6xl mb-2">${crisis.emoji}</div>
        <div class="font-bold text-red-300">${crisis.name}</div>
        <div class="text-red-400 text-sm mt-1">- ${crisis.damage}</div>
      `;
      playerHealth = Math.max(0, playerHealth - crisis.damage);
      log(`Crisis: <strong>${crisis.name}</strong> → -${crisis.damage} Economy`, "text-red-400");
      updateHealth();
      currentTurn++;
      document.getElementById("turn-counter").textContent = String(currentTurn).padStart(2,'0');
      if (!gameOver) setTimeout(drawCard, 400);
      checkEnd();
    }

    function checkEnd() {
      if (depressionHealth <= 0) {
        gameOver = true;
        showEnd(true);
      } else if (playerHealth <= 0) {
        gameOver = true;
        showEnd(false);
      }
    }

    function showEnd(won) {
      const m = document.getElementById("game-over-modal");
      document.getElementById("game-over-icon").textContent = won ? "🎉" : "💀";
      document.getElementById("game-over-title").textContent = won ? "America Recovered!" : "Depression Won";
      document.getElementById("game-over-subtitle").innerHTML = won 
        ? "You saved the nation with the New Deal."
        : "The economy collapsed under pressure.";
      document.getElementById("final-score").textContent = recoveryScore;
      document.getElementById("final-cards").textContent = cardsPlayed;
      m.classList.remove("hidden");
    }

    function hideGameOver() {
      document.getElementById("game-over-modal").classList.add("hidden");
    }

    function endTurnEarly() {
      if (!gameOver) aiTurn();
    }

    function showRules() {
      alert("NEW DEAL SHOWDOWN\n\nYou play as FDR.\n• Play New Deal policy cards to reduce Depression strength\n• Heal your economy when possible\n• Survive random historical crises\n• Win by bringing Depression to 0 before your economy hits 0\n\nEnjoy learning 1930s history!");
    }

    function restartGame() {
      hideGameOver();
      playerHealth = 100; depressionHealth = 100; cardsPlayed = 0; currentTurn = 1; recoveryScore = 0; gameOver = false;
      currentPlayerDeck = shuffle([...playerDeck]);
      currentAIDeck = shuffle([...aiDeck]);
      playerHand = currentPlayerDeck.splice(0,3);
      document.getElementById("game-log").innerHTML = `<div class="text-center text-emerald-400 py-6">March 1933 – FDR takes office</div>`;
      document.getElementById("turn-counter").textContent = "01";
      document.getElementById("recovery-score").textContent = "0";
      document.getElementById("cards-played-count").textContent = "0";
      document.getElementById("deck-count").textContent = currentPlayerDeck.length;
      document.getElementById("ai-played-card").innerHTML = `<div class="text-5xl opacity-40 mb-3">📉</div><p class="text-amber-300/60 text-sm">Waiting...</p>`;
      updateHealth();
      renderHand();
      log("New game started – Good luck, Mr. President!", "text-amber-300");
    }

    // Start
    window.onload = () => {
      currentPlayerDeck = shuffle([...playerDeck]);
      currentAIDeck = shuffle([...aiDeck]);
      playerHand = currentPlayerDeck.splice(0,3);
      updateHealth();
      renderHand();
      document.getElementById("deck-count").textContent = currentPlayerDeck.length;
      log("Your hand is ready. Begin!", "text-emerald-400");
    };
  </script>
</body>
</html>
