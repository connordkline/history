<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DUST & DETERMINATION – Great Depression Survival</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville&display=swap" rel="stylesheet">
  <style>
    body {
      background: #1a140f url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" /><feColorMatrix type="matrix" values="0.4 0 0 0 0  0 0.35 0 0 0  0 0 0.3 0 0  0 0 0 1 0"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.07"/></svg>') repeat;
      color: #e8d5b5;
      font-family: 'PT Serif', serif;
    }
    h1, h2 {
      font-family: 'Special Elite', cursive;
    }
    .newsprint {
      background: #f5e9d2;
      background-image: 
        linear-gradient(#e8d5b5 1px, transparent 1px),
        linear-gradient(90deg, #e8d5b5 1px, transparent 1px);
      background-size: 4px 4px;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.25);
      border: 2px solid #8b6f47;
      border-image: linear-gradient(to bottom, #d4a373, #8b6f47) 1;
    }
    .card {
      background: #fdf6e3;
      border: 3px solid #6b4c2e;
      box-shadow: 0 8px 16px -4px rgba(0,0,0,0.5), inset 0 0 12px rgba(139,111,71,0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-8px) rotate(1.5deg);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
    }
    .distressed {
      position: relative;
    }
    .distressed::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(0,0,0,0.08) 0%, transparent 60%);
      pointer-events: none;
      mix-blend-mode: multiply;
    }
    .health-bar-outer {
      background: #3a2a1f;
      border: 2px solid #8b6f47;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7);
    }
    .crisis-stamp {
      position: absolute;
      top: 12px;
      right: -18px;
      transform: rotate(12deg);
      background: #c0392b;
      color: white;
      font-family: 'Special Elite', cursive;
      padding: 4px 16px;
      border-radius: 4px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #game-log {
      background: #2f1e12;
      border: 2px solid #8b6f47;
      color: #d9c2a3;
    }
  </style>
</head>
<body class="min-h-screen pb-10">

  <!-- Header -->
  <header class="bg-[#1f160e] border-b-4 border-[#8b6f47] sticky top-0 z-50 shadow-2xl">
    <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="text-4xl opacity-90">🌾</div>
        <div>
          <h1 class="text-3xl md:text-5xl font-bold text-[#e8c39c] tracking-tight drop-shadow-md">DUST & DETERMINATION</h1>
          <p class="text-[#c9a875] text-sm md:text-base font-light italic">Surviving the Great Depression • 1930–1939</p>
        </div>
      </div>
      <div class="flex gap-5">
        <button onclick="showRules()" class="text-[#d4a373] hover:text-[#f5d5a5] transition-colors flex items-center gap-2 text-sm md:text-base">
          <i class="fa-solid fa-book-open"></i> Almanac
        </button>
        <button onclick="restartGame()" class="bg-[#8b6f47] hover:bg-[#a68a5f] px-5 py-2.5 rounded shadow-md text-sm md:text-base font-medium text-[#2f1e12]">
          Start Over
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- Hardship Meter -->
    <section class="lg:col-span-3 order-2 lg:order-1">
      <div class="newsprint p-6 rounded-lg distressed">
        <h2 class="text-[#a63232] text-xl font-bold mb-4 border-b-2 border-[#8b6f47] pb-2">HARDSHIP INDEX</h2>
        <div class="mb-6">
          <div class="flex justify-between text-sm mb-1 text-[#c0392b]">
            <span>Pressure</span>
            <span id="hardship-level">100</span>
          </div>
          <div class="health-bar-outer h-5 rounded-full overflow-hidden">
            <div id="hardship-bar" class="h-full bg-gradient-to-r from-[#c0392b] via-[#e67e22] to-[#f39c12] w-full transition-all duration-1000"></div>
          </div>
        </div>
        <div class="relative text-center">
          <p class="text-[#8b6f47] text-xs uppercase tracking-wider mb-2">Latest Blow</p>
          <div id="crisis-card" class="newsprint p-5 min-h-[200px] flex flex-col items-center justify-center text-center relative">
            <div class="text-6xl opacity-30 mb-3">🌪️</div>
            <p class="text-[#6b4c2e] text-sm">Waiting for next storm...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Main Play Area -->
    <section class="lg:col-span-6 order-1 lg:order-2 flex flex-col gap-6">

      <!-- Log -->
      <div id="game-log" class="newsprint p-6 h-56 md:h-72 overflow-y-auto text-sm leading-relaxed rounded-lg distressed">
        <div class="text-center text-[#8b6f47] py-10 italic">
          <i class="fa-solid fa-newspaper mr-2"></i> The hard years begin...
        </div>
      </div>

      <!-- Family Condition -->
      <div class="newsprint p-6 rounded-lg text-center distressed">
        <div class="text-[#2e7d32] text-sm md:text-base uppercase tracking-wider mb-2 font-bold">FAMILY CONDITION</div>
        <div class="flex items-center justify-center gap-6">
          <div id="family-health" class="text-6xl md:text-7xl font-bold text-[#2e7d32] drop-shadow">100</div>
          <div class="h-12 w-px bg-[#8b6f47]"></div>
          <div class="w-48 md:w-64">
            <div class="health-bar-outer h-6 rounded-full overflow-hidden">
              <div id="family-bar" class="h-full bg-gradient-to-r from-[#2e7d32] to-[#66bb6a] w-full transition-all duration-1000"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Hand -->
      <div class="newsprint p-6 rounded-lg distressed">
        <div class="flex justify-between items-center mb-4">
          <div class="text-[#6b4c2e] text-sm md:text-base font-bold">YOUR SURVIVAL TACTICS • <span id="hand-count">3</span></div>
          <button onclick="drawCard()" class="text-[#8b6f47] hover:text-[#a68a5f] text-sm md:text-base flex items-center gap-2">
            Scrounge <span id="deck-count" class="bg-[#6b4c2e] text-[#e8d5b5] px-3 py-1 rounded-full text-xs">12</span>
          </button>
        </div>
        <div id="player-hand" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5">
          <!-- cards injected here -->
        </div>
      </div>

      <!-- Controls -->
      <div class="flex justify-center">
        <button onclick="waitMonth()" class="bg-[#6b4c2e] hover:bg-[#8b6f47] text-[#f5e9d2] px-8 py-4 rounded shadow-lg flex items-center gap-3 text-base font-medium transition-colors">
          <i class="fa-solid fa-calendar-days"></i> Endure Another Month
        </button>
      </div>
    </section>

    <!-- Stats -->
    <section class="lg:col-span-3 order-3">
      <div class="newsprint p-6 rounded-lg text-center distressed">
        <div class="text-[#6b4c2e] text-sm uppercase tracking-wider mb-2">RECORD</div>
        <div id="turn-counter" class="text-5xl font-bold text-[#a63232] mb-6">JAN 1930</div>
        <div class="space-y-4 text-left text-sm">
          <div class="flex justify-between border-b border-[#8b6f47]/30 pb-2">
            <span class="text-[#8b6f47]">Endurance Score</span>
            <span id="survival-score" class="text-[#2e7d32] font-bold">0</span>
          </div>
          <div class="flex justify-between">
            <span class="text-[#8b6f47]">Tactics Used</span>
            <span id="actions-count" class="font-bold">0</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Card Modal -->
  <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50" onclick="if(event.target===this) hideModal()">
    <div class="newsprint border-4 border-[#8b6f47] rounded-lg max-w-md w-[94%] max-h-[92vh] overflow-y-auto shadow-2xl distressed">
      <div id="modal-card" class="p-7"></div>
      <div class="flex border-t-2 border-[#8b6f47] p-5 gap-4">
        <button onclick="hideModal()" class="flex-1 py-3 bg-[#3a2a1f] hover:bg-[#4a3a2f] text-[#d9c2a3] rounded">Close</button>
        <button onclick="confirmPlay()" class="flex-1 py-3 bg-[#2e7d32] hover:bg-[#388e3c] text-white rounded font-medium">Put to Use</button>
      </div>
    </div>
  </div>

  <!-- Game Over -->
  <div id="game-over-modal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50" onclick="if(event.target===this) hideGameOver()">
    <div class="newsprint border-4 border-[#8b6f47] rounded-lg p-8 max-w-lg w-[94%] text-center distressed">
      <div id="game-over-icon" class="text-8xl mb-5 drop-shadow-lg"></div>
      <h2 id="game-over-title" class="text-4xl font-bold text-[#a63232] mb-3"></h2>
      <p id="game-over-subtitle" class="text-[#6b4c2e] mb-8 text-lg italic"></p>
      <div class="bg-[#2f1e12]/60 rounded-lg p-6 mb-8 grid grid-cols-2 gap-6 text-left">
        <div>
          <div class="text-[#8b6f47] text-xs uppercase">Score</div>
          <div id="final-score" class="text-5xl text-[#2e7d32]">0</div>
        </div>
        <div>
          <div class="text-[#8b6f47] text-xs uppercase">Tactics</div>
          <div id="final-actions" class="text-5xl text-[#e8c39c]">0</div>
        </div>
      </div>
      <button onclick="hideGameOver(); restartGame()" class="w-full py-5 bg-[#8b6f47] hover:bg-[#a68a5f] text-[#2f1e12] rounded-lg text-xl font-medium">
        Try Again
      </button>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────
    //  CARDS (same logic, just theme renamed slightly)
    // ────────────────────────────────────────────────
    const playerDeck = [
      {id:1, name:"Victory Garden", emoji:"🥕", value:18, heal:10, desc:"Plant potatoes, beans, squash in every spare patch of dirt", fact:"By 1943, 20 million victory gardens produced ~40% of vegetables in US", type:"survival"},
      {id:2, name:"Neighborhood Barter", emoji:"🤝", value:15, heal:12, desc:"Trade eggs for flour, mend shoes for milk", fact:"Cash was scarce; barter networks kept many families fed", type:"survival"},
      {id:3, name:"CCC Work Camp", emoji:"🌲", value:22, heal:8, desc:"Send a son to plant trees, fight fires, earn $30/month", fact:"Over 3 million young men joined the Civilian Conservation Corps", type:"survival"},
      {id:4, name:"Charity Soup Line", emoji:"🍲", value:10, heal:18, desc:"Stand for hours for a bowl of broth and bread", fact:"Churches and missions fed millions during the worst years", type:"survival"},
      {id:5, name:"Day Labor Hustle", emoji:"🛠️", value:16, heal:9, desc:"Shovel coal, haul scrap, clean yards for pennies", fact:"Many men walked miles daily looking for any work", type:"survival"},
      {id:6, name:"Make Do & Mend", emoji:"🧵", value:12, heal:14, desc:"Turn flour sacks into dresses, darn socks till they disappear", fact:"Government promoted frugality; 'Use it up, wear it out'", type:"survival"},
      {id:7, name:"WPA Road Crew", emoji:"🛤️", value:20, heal:15, desc:"Get on a WPA crew building roads, schools, parks", fact:"WPA employed over 8.5 million people at its peak", type:"survival"}
    ];

    const crisisDeck = [
      {id:101, name:"Mass Layoffs", emoji:"🚪", damage:22, desc:"Factory gates locked; no paycheck for months", fact:"Unemployment reached 25% in 1933", type:"crisis"},
      {id:102, name:"Bank Failure", emoji:"🏦", damage:18, desc:"Bank shutters overnight; life savings vanish", fact:"Over 9,000 banks failed between 1929–1933", type:"crisis"},
      {id:103, name:"Eviction", emoji:"🚚", damage:20, desc:"Landlord puts furniture on sidewalk", fact:"Hundreds of thousands lost homes; shantytowns grew", type:"crisis"},
      {id:104, name:"Black Blizzard", emoji:"🌪️", damage:24, desc:"Dust storm blinds, chokes, buries crops", fact:"Dust Bowl forced ~2.5 million people to leave the Plains", type:"crisis"},
      {id:105, name:"Empty Cupboard", emoji:"🏚️", damage:16, desc:"Last jar of beans gone; children crying", fact:"Malnutrition widespread despite charity efforts", type:"crisis"},
      {id:106, name:"Farm Foreclosure", emoji:"🔨", damage:21, desc:"Auction sign on the gate; land lost forever", fact:"One in four farms foreclosed during the decade", type:"crisis"}
    ];

    // Game state
    let familyHealth = 100;
    let hardshipLevel = 100;
    let playerHand = [];
    let currentPlayerDeck = [];
    let currentCrisisDeck = [];
    let actionsTaken = 0;
    let month = 1;
    let year = 1930;
    let gameOver = false;
    let selectedCard = null;
    let survivalScore = 0;

    const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function updateBars() {
      const f = Math.max(0, Math.min(100, familyHealth));
      const h = Math.max(0, Math.min(100, hardshipLevel));
      document.getElementById("family-health").textContent = Math.floor(f);
      document.getElementById("family-bar").style.width = f + "%";
      document.getElementById("hardship-level").textContent = Math.floor(h);
      document.getElementById("hardship-bar").style.width = h + "%";
    }

    function createCardHTML(card, clickable = true) {
      const isCrisis = card.type === "crisis";
      return `
        <div class="card p-5 h-64 flex flex-col justify-between relative ${clickable ? 'cursor-pointer' : ''} rounded-lg">
          ${isCrisis ? `<div class="crisis-stamp">CRISIS</div>` : ''}
          <div class="flex justify-between items-start">
            <div class="text-5xl">${card.emoji}</div>
            <div class="text-xs font-bold uppercase ${isCrisis ? 'text-[#c0392b]' : 'text-[#2e7d32]'}">${isCrisis ? 'HARDSHIP' : 'SURVIVAL'}</div>
          </div>
          <div>
            <div class="font-bold text-xl leading-tight mb-2">${card.name}</div>
            <div class="text-sm text-[#4a3726] line-clamp-3">${card.desc}</div>
          </div>
          <div class="flex gap-3 text-xs mt-3">
            ${isCrisis 
              ? `<div class="bg-[#c0392b] text-white px-4 py-1.5 rounded-full">Strain ${card.damage}</div>`
              : `
                <div class="bg-[#2e7d32] text-white px-4 py-1.5 rounded-full">Ease ${card.value}</div>
                ${card.heal ? `<div class="bg-[#388e3c] text-white px-4 py-1.5 rounded-full">Hope ${card.heal}</div>` : ''}
              `}
          </div>
        </div>
      `;
    }

    function renderHand() {
      const container = document.getElementById("player-hand");
      container.innerHTML = "";
      playerHand.forEach(card => {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = createCardHTML(card);
        wrapper.onclick = () => showCardModal(card);
        container.appendChild(wrapper);
      });
      document.getElementById("hand-count").textContent = playerHand.length;
    }

    function log(message, className = "") {
      const logEl = document.getElementById("game-log");
      const entry = document.createElement("div");
      entry.className = `py-3 border-b border-[#8b6f47]/30 last:border-0 ${className}`;
      entry.innerHTML = message;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function drawCard() {
      if (gameOver || currentPlayerDeck.length === 0 || playerHand.length >= 5) return;
      const card = currentPlayerDeck.pop();
      playerHand.push(card);
      renderHand();
      document.getElementById("deck-count").textContent = currentPlayerDeck.length;
      log(`Found another way to keep going: <strong>${card.name}</strong>`, "text-[#2e7d32]");
    }

    function showCardModal(card) {
      if (gameOver) return;
      selectedCard = card;
      document.getElementById("modal-card").innerHTML = `
        ${createCardHTML(card, false)}
        <div class="mt-6 bg-[#2f1e12]/40 p-5 rounded border border-[#8b6f47]/50 text-sm">
          <div class="text-[#8b6f47] uppercase text-xs mb-2 tracking-wider">From the Record</div>
          <p class="italic text-[#d9c2a3]">${card.fact}</p>
        </div>
      `;
      document.getElementById("modal-backdrop").classList.remove("hidden");
    }

    function hideModal() {
      document.getElementById("modal-backdrop").classList.add("hidden");
      selectedCard = null;
    }

    function confirmPlay() {
      if (!selectedCard) return;
      hideModal();

      playerHand = playerHand.filter(c => c.id !== selectedCard.id);
      hardshipLevel = Math.max(0, hardshipLevel - selectedCard.value);
      if (selectedCard.heal) familyHealth = Math.min(100, familyHealth + selectedCard.heal);

      actionsTaken++;
      survivalScore += Math.floor(selectedCard.value * 1.3 + (selectedCard.heal || 0) * 1.6);

      renderHand();
      updateBars();
      document.getElementById("survival-score").textContent = survivalScore;
      document.getElementById("actions-count").textContent = actionsTaken;

      log(`Used <strong>${selectedCard.name}</strong> — hardship eased ${selectedCard.heal ? 'and spirits lifted' : ''}`, "text-[#2e7d32] font-medium");

      setTimeout(nextCrisis, 800);
      checkEnd();
    }

    function nextCrisis() {
      if (gameOver || currentCrisisDeck.length === 0) return;
      const crisis = currentCrisisDeck.pop();
      document.getElementById("crisis-card").innerHTML = createCardHTML(crisis, false);
      familyHealth = Math.max(0, familyHealth - crisis.damage);
      log(`Hardship strikes: <strong>${crisis.name}</strong> — family takes -${crisis.damage}`, "text-[#c0392b] font-medium");
      updateBars();
      advanceTime();
      checkEnd();
    }

    function advanceTime() {
      month++;
      if (month > 12) { month = 1; year++; }
      document.getElementById("turn-counter").textContent = `${months[month-1]} ${year}`;
      if (!gameOver && Math.random() > 0.3) drawCard(); // ~70% chance to find something helpful each month
    }

    function waitMonth() {
      if (!gameOver) nextCrisis();
    }

    function checkEnd() {
      if (hardshipLevel <= 0) {
        gameOver = true;
        showEnd(true);
      } else if (familyHealth <= 0) {
        gameOver = true;
        showEnd(false);
      }
    }

    function showEnd(won) {
      const modal = document.getElementById("game-over-modal");
      document.getElementById("game-over-icon").textContent = won ? "🌾🏡" : "💔";
      document.getElementById("game-over-title").textContent = won ? "The Family Endured" : "The Storm Was Too Much";
      document.getElementById("game-over-subtitle").innerHTML = won 
        ? "Through grit and small victories,<br>your family made it to better days."
        : "The weight of the Depression broke even the strongest.";
      document.getElementById("final-score").textContent = survivalScore;
      document.getElementById("final-actions").textContent = actionsTaken;
      modal.classList.remove("hidden");
    }

    function hideGameOver() {
      document.getElementById("game-over-modal").classList.add("hidden");
    }

    function showRules() {
      alert("DUST & DETERMINATION\n\nYou are an ordinary American family during the Great Depression.\nPlay survival tactics to reduce hardship and keep hope alive.\nFace real historical crises each month.\nGoal: Bring hardship to 0 before family condition reaches 0.\n\nEvery card reflects true ways people survived the 1930s.");
    }

    function restartGame() {
      hideGameOver();
      familyHealth = 100;
      hardshipLevel = 100;
      actionsTaken = 0;
      month = 1;
      year = 1930;
      survivalScore = 0;
      gameOver = false;

      currentPlayerDeck = shuffle([...playerDeck]);
      currentCrisisDeck = shuffle([...crisisDeck]);
      playerHand = currentPlayerDeck.splice(0, 3);

      document.getElementById("game-log").innerHTML = `<div class="text-center text-[#8b6f47] py-10 italic">Late October 1929 – the bottom begins to fall out...</div>`;
      document.getElementById("turn-counter").textContent = "JAN 1930";
      document.getElementById("survival-score").textContent = "0";
      document.getElementById("actions-count").textContent = "0";
      document.getElementById("deck-count").textContent = currentPlayerDeck.length;
      document.getElementById("crisis-card").innerHTML = `<div class="text-6xl opacity-30 mb-3">🌪️</div><p class="text-[#6b4c2e] text-sm">Waiting for next storm...</p>`;

      updateBars();
      renderHand();
      log("Another winter coming. Your family looks to you.", "text-[#d4a373]");
    }

    // Start game
    window.onload = () => {
      currentPlayerDeck = shuffle([...playerDeck]);
      currentCrisisDeck = shuffle([...crisisDeck]);
      playerHand = currentPlayerDeck.splice(0, 3);
      updateBars();
      renderHand();
      document.getElementById("deck-count").textContent = currentPlayerDeck.length;
      log("The newspapers are full of bad news. What will you do first?", "text-[#d4a373]");
    };
  </script>
</body>
</html>
