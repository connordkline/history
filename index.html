<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Depression Survival – Debug Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
    }
    .card {
      background: #ffe8c0;
      border: 4px solid brown;
      border-radius: 12px;
      padding: 16px;
      margin: 8px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }
    .card:hover, .card:active {
      transform: scale(1.05);
      box-shadow: 0 0 15px yellow;
    }
    #player-hand {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #modal-content {
      background: #ffe8c0;
      border: 5px solid brown;
      border-radius: 12px;
      max-width: 90%;
      width: 420px;
      padding: 20px;
      color: #222;
    }
    button {
      padding: 12px 24px;
      font-size: 1.1rem;
      margin: 8px;
      border-radius: 8px;
      cursor: pointer;
    }
    .green { background: #28a745; color: white; }
    .red    { background: #dc3545; color: white; }
    #log {
      background: #222;
      color: #0f0;
      font-family: monospace;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      margin: 12px 0;
      border: 2px solid #444;
    }
  </style>
</head>
<body>

<h1 style="text-align:center; color:#ffcc66;">Surviving the Depression – DEBUG MODE</h1>

<div style="max-width:1100px; margin:auto;">

  <div style="display:flex; justify-content:space-between; margin:20px 0;">
    <div>
      <strong>Family Health:</strong> <span id="health">100</span>  
      <div style="width:200px;height:20px;background:#444;border:2px solid gray;">
        <div id="healthbar" style="width:100%;height:100%;background:lime;transition:width 0.6s;"></div>
      </div>
    </div>
    <div>
      <strong>Hardship:</strong> <span id="hardship">100</span>  
      <div style="width:200px;height:20px;background:#444;border:2px solid gray;">
        <div id="hardshipbar" style="width:100%;height:100%;background:red;transition:width 0.6s;"></div>
      </div>
    </div>
  </div>

  <div id="log">Game starting… click a card → then "PLAY CARD" in popup</div>

  <h3>Your cards (click to select):</h3>
  <div id="player-hand"></div>

  <div style="text-align:center; margin:20px 0;">
    <button onclick="drawCard()" class="green">Draw a card</button>
    <button onclick="nextCrisis()" class="red">Force next crisis</button>
  </div>

</div>

<!-- MODAL -->
<div id="modal">
  <div id="modal-content">
    <h2 id="modal-title"></h2>
    <div id="modal-desc" style="margin:16px 0;"></div>
    <div id="modal-effect" style="font-weight:bold; margin:12px 0;"></div>
    <div style="text-align:center;">
      <button onclick="hideModal()" style="background:#6c757d;color:white;">Close</button>
      <button id="playButton" class="green">PLAY CARD</button>
    </div>
  </div>
</div>

<script>
// ───── DATA ─────
const cards = [
  {id:1, name:"Victory Garden", emoji:"🥕", value:18, heal:10, desc:"Plant potatoes & beans"},
  {id:2, name:"Barter",         emoji:"🤝", value:15, heal:12, desc:"Trade eggs for flour"},
  {id:3, name:"CCC Work",       emoji:"🌲", value:22, heal:8,  desc:"Son joins tree-planting camp"},
  {id:4, name:"Soup Kitchen",   emoji:"🍲", value:10, heal:18, desc:"Stand in line for broth"}
];

const crises = [
  {id:101, name:"Layoffs",      emoji:"🚫", damage:22, desc:"Factory closed – no pay"},
  {id:102, name:"Bank Fail",    emoji:"🏦", damage:18, desc:"Savings gone overnight"},
  {id:103, name:"Eviction",     emoji:"🚪", damage:20, desc:"Furniture on sidewalk"},
  {id:104, name:"Dust Storm",   emoji:"🌪️", damage:24, desc:"Black blizzard – crops dead"}
];

// ───── STATE ─────
let familyHealth   = 100;
let hardshipLevel  = 100;
let hand           = [];
let deck           = [...cards];
let crisisDeck     = [...crises];
let selectedCard   = null;

// ───── HELPERS ─────
function log(txt, color='lime') {
  const logEl = document.getElementById('log');
  logEl.innerHTML += `<div style="color:${color}">[LOG] ${txt}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
  console.log(txt);
}

function updateUI() {
  document.getElementById('health').textContent    = familyHealth;
  document.getElementById('healthbar').style.width = familyHealth + '%';
  document.getElementById('hardship').textContent  = hardshipLevel;
  document.getElementById('hardshipbar').style.width = hardshipLevel + '%';
}

function renderHand() {
  const container = document.getElementById('player-hand');
  container.innerHTML = '';
  hand.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div style="font-size:3.5rem; text-align:center;">${card.emoji}</div>
      <div style="font-weight:bold; text-align:center; font-size:1.3rem;">${card.name}</div>
      <div style="text-align:center; color:#555;">${card.desc}</div>
      <div style="text-align:center; margin-top:12px;">
        <span style="background:#28a745;color:white;padding:4px 12px;border-radius:12px;">Ease ${card.value}</span>
        <span style="background:#17a2b8;color:white;padding:4px 12px;border-radius:12px;">Heal ${card.heal}</span>
      </div>
    `;
    div.onclick = () => showModal(card);
    container.appendChild(div);
  });
}

// ───── ACTIONS ─────
function drawCard() {
  if (deck.length === 0) return log("No more cards!", "orange");
  const card = deck.pop();
  hand.push(card);
  renderHand();
  log(`Drew → ${card.name}`);
}

function showModal(card) {
  log(`Clicked card: ${card.name} (id ${card.id})`);
  selectedCard = card;

  document.getElementById('modal-title').textContent = card.name + "  " + card.emoji;
  document.getElementById('modal-desc').textContent  = card.desc;
  document.getElementById('modal-effect').innerHTML  = 
    `Reduces hardship by <b>${card.value}</b><br>Heals family by <b>${card.heal}</b>`;

  document.getElementById('modal').style.display = 'flex';
}

function hideModal() {
  document.getElementById('modal').style.display = 'none';
  selectedCard = null;
  log("Modal closed");
}

function playCard() {
  if (!selectedCard) {
    log("BUG: No card selected when Play was pressed!", "red");
    return;
  }

  log(`PLAYING CARD → ${selectedCard.name}`, "yellow");

  // actually play it
  hardshipLevel = Math.max(0, hardshipLevel - selectedCard.value);
  familyHealth  = Math.min(100, familyHealth + selectedCard.heal);

  // remove from hand
  hand = hand.filter(c => c.id !== selectedCard.id);
  renderHand();

  updateUI();
  hideModal();

  log(`Success! Hardship now ${hardshipLevel} | Health now ${familyHealth}`, "lime");

  // next crisis after delay
  setTimeout(nextCrisis, 800);
}

function nextCrisis() {
  if (crisisDeck.length === 0) return log("No more crises!", "orange");
  const crisis = crisisDeck.pop();
  familyHealth = Math.max(0, familyHealth - crisis.damage);
  updateUI();
  document.getElementById('crisis-card').innerHTML = `
    <div style="font-size:4rem; opacity:0.7;">${crisis.emoji}</div>
    <div style="font-weight:bold; margin:12px 0;">${crisis.name}</div>
    <div style="color:#900;">Family loses ${crisis.damage} health</div>
  `;
  log(`CRISIS: ${crisis.name} → -${crisis.damage} health`, "red");
}

// ───── START ─────
window.onload = () => {
  deck = shuffle(deck);
  crisisDeck = shuffle(crisisDeck);
  hand = deck.splice(0,3);
  renderHand();
  updateUI();
  log("Game ready. Click any card → then press PLAY CARD in popup", "cyan");
  document.getElementById('playButton').onclick = playCard;
  document.getElementById('playButton').addEventListener('click', playCard); // double safety
};
</script>
</body>
</html>
